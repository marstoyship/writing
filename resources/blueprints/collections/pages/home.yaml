hide: true
title: Intro
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              character_limit: 0
              display: Title
              validate:
                - required
          -
            handle: subtitle
            field:
              character_limit: 0
              type: text
              display: Subtitle
          -
            handle: content
            field:
              escape_markup: true
              type: markdown
              display: Content
          -
            handle: template
            field:
              type: template
              display: Template
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
