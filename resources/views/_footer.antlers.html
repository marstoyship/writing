<nav class="flex items-center justify-between flex-wrap py-12 lg:py-24 max-w-5xl mx-auto">
    <div>
        <div class="text-sm mb-4">&copy; {{ now format="Y" }} {{ settings:site_name }}</div>
        {{ nav:footer_navigation }}
            <a href="{{ url }}" class="block text-sm text-gray-600 hover:text-teal mb-2">{{ title }}</a>
        {{ /nav:footer_navigation }}
    </div>
    <div class="flex items-center">
        {{ settings:social }}
            <a href="{{ url }}" class="ml-4" aria-label="{{ name }}" rel="noopener">
                {{ svg :src="icon" class="h-6 w-6 hover:text-teal" }}
            </a>
        {{ /settings:social }}
    </div>
</nav>
